annotation_guidelines: "ANNOTATION GUIDELINES:\n1. Familiarize Yourself with the Psychological Dimensions: Before beginning\n\
  \   the annotation process, thoroughly understand the psychological dimensions\n   you will be annotating for. They all\
  \ appear in this guide.\n2. Consistency is Key: Maintain consistency in your annotations. It is\n   essential to apply the\
  \ same criteria and judgment across all posts to\n   ensure uniformity in the data.\n3. Context Matters: Always consider\
  \ the context of a piece of text.\n   Psychological states and sentiments are often influenced by the context\n   in which\
  \ language is used. Pay attention to nuances, idiomatic\n   expressions, and cultural references that might affect interpretation.\n\
  4. Stay Objective: While some degree of subjective judgment is inevitable,\n   strive to remain as objective as possible.\
  \ Base your annotations on\n   observable evidence within the text rather than inferring too deeply into\n   the author's\
  \ intentions or state of mind. You will encounter posts that\n   you may find objectionable. In these cases, you should\
  \ maintain\n   objectivity and focus on the task rather than respond to the content.\n5. When Uncertain, Commit: If you\
  \ are unsure whether a label applies, note\n   your uncertainty in your reasoning, but still commit to a definitive\n  \
  \ YES or NO answer.\n\nBy adhering to these guidelines, you will contribute significantly to the\nadvancement of our understanding\
  \ of the interplay between language,\npsychology, and technology. This work not only enhances academic knowledge\nbut also\
  \ paves the way for more empathetic and effective computational\nsystems in the future.\n"
